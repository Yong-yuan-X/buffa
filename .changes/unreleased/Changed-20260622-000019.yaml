kind: Changed
body: |-
  Generated `write_to` bodies use new fused `put_*_field` runtime writers
  (one call per field arm) instead of separate tag-encode + payload-encode
  pairs (~870 sites); owned and view impls share them. Wire output is
  byte-identical. (#195)
